<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pariscroissant</title>
    <link rel="stylesheet" href="style.css" type="text/css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/1f6d71235d.js"
      crossorigin="anonymous"
    ></script>
    <script src="script.js" type="text/javascript"></script>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="img/paris-logo.png" alt="logo" />
      </div>
      <div class="customer">
        <ul class="customer__menu">
          <li>고객센터</li>
          <li>영양정보</li>
        </ul>
      </div>
      <div class="nav">
        <ul class="gnb">
          <li>Brand</li>
          <li>Menu</li>
          <li>Store</li>
          <li>Reservation</li>
        </ul>
      </div>
    </header>
    <div id="mainBanner">
      <div class="mainBanner__img"></div>
      <div class="mainBanner__prev"></div>
      <div class="mainBanner__next"></div>
    </div>
    <div id="sidebar">
      <ul>
        <li class="sidebar__menu"><a href="#"></a></li>
        <li class="sidebar__menu"><a href="#"></a></li>
        <li class="sidebar__menu"><a href="#"></a></li>
      </ul>
    </div>
    <div id="content">
      <div class="content__search">
        <ul>
          <li><i class="fas fa-map-marker-alt"></i>매장찾기</li>
          <li><i class="fas fa-vote-yea"></i>예약문의</li>
        </ul>
      </div>
      <div class="content__news">
        <div class="news__title"></div>
        <div class="news__content"></div>
      </div>
      <div class="content__menu">
        <ul>
          <li class="menu__item"><a href="#"></a></li>
          <li class="menu__item"><a href="#"></a></li>
          <li class="menu__item"><a href="#"></a></li>
          <li class="menu__item"><a href="#"></a></li>
          <li class="menu__item"><a href="#"></a></li>
          <li class="menu__item"><a href="#"></a></li>
        </ul>
      </div>
      <div class="content__kitchen">
        <h1>Kitchen</h1>
      </div>
    </div>
    <footer></footer>
  </body>
</html>
